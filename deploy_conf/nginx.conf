server {
    listen 5173;
    server_name _;

    root /www/;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
    location = /site.webmanifest {
        try_files $uri =404;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
}
