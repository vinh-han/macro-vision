services:
    frontend:
        build:
            context: .
            dockerfile: ./frontend/Dockerfile
        container_name: frontend
        ports:
            - ${FRONTEND_PORT}:5173
        develop:
            watch:
                - action: rebuild
                  path: ./frontend/package.json
                - action: rebuild
                  path: ./frontend/vite.config.js
                - action: rebuild
                  path: ./frontend/eslint.config.js
        volumes:
            - ./frontend/:/frontend/
            - /frontend/node_modules
    backend:
        build:
            context: ./
            dockerfile: ./food_db/Dockerfile
        container_name: backend
        ports:
            - ${BACKEND_PORT}:8000
        restart: unless-stopped
        volumes:
            - ./food_db/links:/backend/links:ro
        develop:
            watch:
                - action: rebuild
                  path: ./food_db
                  ignore:
                      - ./food_db/links
        depends_on:
            database:
                condition: service_healthy
    database:
        image: "postgres:14.19-alpine3.21"
        container_name: database
        env_file: ".env"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 15s
        volumes:
            - postgres_data:/var/lib/postgresql/data

    adminer:
        image: adminer
        container_name: adminer
        ports:
            - 8080:8080
        environment:
            ADMINER_DEFAULT_SERVER: database

    grouper:
        profiles: [grouper]
        build:
            context: ./
            dockerfile: ./grouper/Dockerfile
        depends_on:
            database:
                condition: service_healthy

    img_scraper:
        profiles: [scraper]
        build:
            context: ./
            dockerfile: ./img_scraper/Dockerfile
        volumes:
            - ./img_scraper/tmp/:/img_scraper/tmp/
            - ./img_scraper/images/:/img_scraper/images/
        depends_on:
            database:
                condition: service_healthy

    model_api:
        profiles: [model]
        build:
            context: ./
            dockerfile: ./model/Dockerfile
        container_name: model_api
        ports:
            - ${MODEL_API_PORT:-8001}:8001
        env_file: ./model/.env
        restart: unless-stopped
        volumes:
            - model_hf_cache:/root/.cache/huggingface
            - model_torch_cache:/root/.cache/torch

volumes:
    postgres_data:
    model_hf_cache:
    model_torch_cache:
