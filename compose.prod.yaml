services:
    proxy:
      image: caddy:latest
      ports:
        - 80:80
        - 443:443
        - 443:443/udp
      volumes:
        - ./deploy_conf:/etc/caddy:z
        - caddy_data:/data
        - caddy_config:/config
    frontend:
        init: true
        image: ${ECR_REPO}/macro-vision/frontend:latest
        build:
          cache_from:
            - ${ECR_REPO}/macro-vision/frontend:cache
          cache_to:
            - ${ECR_REPO}/macro-vision/frontend:cache
          context: ./
          dockerfile: ./frontend/Dockerfile.prod
        container_name: frontend

    backend:
        image: ${ECR_REPO}/macro-vision/backend:latest
        build:
          cache_from:
            - ${ECR_REPO}/macro-vision/backend:cache
          cache_to:
            - ${ECR_REPO}/macro-vision/backend:cache
          context: .
          dockerfile: ./food_db/Dockerfile
        container_name: backend
        restart: unless-stopped
        volumes:
            - ./food_db/links:/backend/links:ro
        depends_on:
            database:
                condition: service_healthy
    database:
        image: "postgres:14.19-alpine3.21"
        container_name: database
        env_file: ".env"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s
        volumes:
            - postgres_data:/var/lib/postgresql/data

    model_api:
        image: ${ECR_REPO}/macro-vision/model_api:latest
        build:
          cache_from:
            - ${ECR_REPO}/macro-vision/model_api:cache
          cache_to:
            - ${ECR_REPO}/macro-vision/model_api:cache
          context: ./model/
        pull_policy: missing
        container_name: model_api
        ports:
            - ${MODEL_API_PORT:-8001}:8001
        restart: unless-stopped

volumes:
    postgres_data:
    caddy_data:
    caddy_config:

