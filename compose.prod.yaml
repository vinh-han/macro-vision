services:
    proxy:
      image: caddy:latest
      ports:
        - 80:80
        - 443:443
        - 443:443/udp
      volumes:
        - ./caddy:/etc/caddy:z
        - caddy_data:/data
        - caddy_config:/config
    frontend:
        init: true
        build:
          context: ./frontend
          dockerfile: ./Dockerfile.prod
        container_name: frontend
        develop:
            watch:
                - action: rebuild
                  path: ./frontend/package.json
                - action: rebuild
                  path: ./frontend/vite.config.js
                - action: rebuild
                  path: ./frontend/eslint.config.js
        volumes:
          - ./frontend/:/frontend/
          - /frontend/node_modules
    backend:
        build: ./food_db/
        container_name: backend
        restart: unless-stopped
        volumes:
            - ./food_db/links:/backend/links:ro
        develop:
            watch:
                - action: rebuild
                  path: ./food_db
                  ignore:
                    - ./food_db/links
        depends_on:
            database:
                condition: service_healthy
    database:
        image: "postgres:14.19-alpine3.21"
        container_name: database
        env_file: ".env"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 0s
        volumes:
            - postgres_data:/var/lib/postgresql

volumes:
    postgres_data:
    caddy_data:
    caddy_config:

