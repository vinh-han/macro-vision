services:
    proxy:
      image: caddy:latest
      ports:
        - 80:80
        - 443:443
        - 443:443/udp
      volumes:
        - ./deploy_conf:/etc/caddy:z
        - caddy_data:/data
        - caddy_config:/config
    frontend:
        init: true
        build:
          context: ./
          dockerfile: ./frontend/Dockerfile.prod
        container_name: frontend

    backend:
        build:
          context: .
          dockerfile: ./food_db/Dockerfile
        container_name: backend
        restart: unless-stopped
        volumes:
            - ./food_db/links:/backend/links:ro
        depends_on:
            database:
                condition: service_healthy
    database:
        image: "postgres:14.19-alpine3.21"
        container_name: database
        env_file: ".env"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 0s
        volumes:
            - postgres_data:/var/lib/postgresql/data

    model_api:
        profiles: [model]
        build:
            context: ./
            dockerfile: ./model/Dockerfile
        container_name: model_api
        ports:
            - ${MODEL_API_PORT:-8001}:8001
        env_file: ./model/.env
        restart: unless-stopped
        volumes:
            - model_hf_cache:/root/.cache/huggingface
            - model_torch_cache:/root/.cache/torch


volumes:
    postgres_data:
    caddy_data:
    caddy_config:

